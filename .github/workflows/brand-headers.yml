name: Heady Sacred Geometry Branding

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  branding:
    name: Sacred Geometry Branding Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🎨 Check Sacred Geometry Branding
      run: npm run brand:check
      
    - name: ✨ Branding Summary
      if: always()
      run: |
        echo "∞ Sacred Geometry Branding Complete ∞"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🌈 All files must carry the Heady Sacred Geometry branding"
        echo "🔮 This ensures visual consistency across the entire ecosystem"




