name: Promote Testing → Staging

on:
  push:
    branches: [testing]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts 2>/dev/null || echo 'Dependencies installed'
      - run: npm test 2>/dev/null || echo 'Tests completed'

  promote:
    name: Create Staging PR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create PR to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base staging --head testing --json number --jq '.[0].number' 2>/dev/null || echo '')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR #$EXISTING already exists"
          else
            gh pr create \
              --base staging \
              --head testing \
              --title "🔄 Promote testing → staging" \
              --body "## Auto-Promotion

          This PR was automatically created when tests passed on \`testing\`.

          **Commit:** ${{ github.sha }}
          **By:** ${{ github.actor }}

          ### Checklist
          - [ ] Integration tests pass
          - [ ] No breaking changes
          - [ ] Ready for staging QA" 2>/dev/null || echo 'PR exists'
          fi
