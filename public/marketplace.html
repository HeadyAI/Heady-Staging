<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Heady Marketplace — Agent Skill Store. Browse, install, and manage AI agent skills across every domain.">
    <meta name="theme-color" content="#050510">
    <title>Heady Marketplace — Agent Skill Store</title>
    <link rel="stylesheet" href="/sacred-geometry.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(160deg, #050510 0%, #0A0A1A 50%, #1A1A3E 100%);
            color: #FAFAFA;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient background orbs */
        body::before {
            content: '';
            position: fixed;
            top: 8%;
            left: 3%;
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: float-orb-a 22s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: 8%;
            right: 3%;
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, rgba(255, 0, 160, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: float-orb-b 28s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float-orb-a {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(24px, -28px); }
            66% { transform: translate(-16px, 20px); }
        }

        @keyframes float-orb-b {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-28px, 18px); }
            66% { transform: translate(18px, -24px); }
        }

        @keyframes phi-pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes glow-pulse-cyan {
            0%, 100% { box-shadow: 0 0 16px rgba(0, 217, 255, 0.3), 0 0 32px rgba(0, 217, 255, 0.15); }
            50% { box-shadow: 0 0 28px rgba(0, 217, 255, 0.55), 0 0 56px rgba(0, 217, 255, 0.25); }
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.93) translateY(16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── NAV ─────────────────────────────────────────────── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.12);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1.5px;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.5px;
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            padding-left: 20px;
            white-space: nowrap;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-installed-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.25);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #00D9FF;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
        }

        .nav-installed-badge:hover {
            background: rgba(0, 217, 255, 0.18);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.25);
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00D9FF;
            animation: phi-pulse 2.618s ease-in-out infinite;
        }

        /* ── VIEW TOGGLE ─────────────────────────────────────── */
        .view-toggle {
            display: flex;
            background: rgba(26, 26, 62, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 3px;
            gap: 2px;
        }

        .toggle-btn {
            padding: 7px 18px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
            white-space: nowrap;
        }

        .toggle-btn.active {
            background: rgba(212, 175, 55, 0.15);
            color: #D4AF37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
        }

        /* ── MAIN LAYOUT ─────────────────────────────────────── */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px 80px;
        }

        /* ── FEATURED BANNER ─────────────────────────────────── */
        .featured-banner {
            margin: 32px 0;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            min-height: 260px;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(26, 26, 62, 0.9) 0%, rgba(10, 10, 26, 0.95) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.1), inset 0 0 80px rgba(212, 175, 55, 0.04);
            animation: slide-up 0.618s cubic-bezier(0.618, 0, 0.382, 1) both;
        }

        /* Animated banner background gradient */
        .featured-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                rgba(212, 175, 55, 0.08) 0%,
                rgba(0, 217, 255, 0.06) 40%,
                rgba(255, 0, 160, 0.08) 100%
            );
            background-size: 300% 100%;
            animation: shimmer 6s linear infinite;
        }

        .featured-geo {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            height: 200px;
            opacity: 0.18;
        }

        .featured-geo .ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1.5px solid #D4AF37;
            animation: spin-slow 20s linear infinite;
        }

        .featured-geo .ring-mid {
            position: absolute;
            inset: 24px;
            border-radius: 50%;
            border: 1px solid #00D9FF;
            animation: spin-reverse 14s linear infinite;
        }

        .featured-geo .ring-inner {
            position: absolute;
            inset: 52px;
            border-radius: 50%;
            border: 1px solid #FF00A0;
            animation: spin-slow 10s linear infinite;
        }

        .featured-geo .ring-core {
            position: absolute;
            inset: 84px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.6) 0%, transparent 70%);
        }

        .featured-content {
            position: relative;
            z-index: 1;
            padding: 40px 48px;
            flex: 1;
        }

        .featured-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #D4AF37;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .featured-title {
            font-size: 36px;
            font-weight: 800;
            color: #FAFAFA;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .featured-title span {
            background: linear-gradient(135deg, #D4AF37, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .featured-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            max-width: 480px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .featured-meta {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 28px;
        }

        .featured-swarm {
            font-size: 12px;
            font-weight: 700;
            color: #00D9FF;
            letter-spacing: 1px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .featured-stars {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #D4AF37;
        }

        .featured-users {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-install {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
            letter-spacing: 0.3px;
        }

        .btn-install.primary {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #050510;
            box-shadow: 0 0 24px rgba(212, 175, 55, 0.4);
        }

        .btn-install.primary:hover {
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.65);
            transform: translateY(-1px);
        }

        .btn-install.primary.installed {
            background: linear-gradient(135deg, #00D9FF, #0099BB);
            color: #050510;
            box-shadow: 0 0 24px rgba(0, 217, 255, 0.4);
        }

        .btn-install.primary.installed:hover {
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.65);
        }

        /* ── SEARCH & FILTER ─────────────────────────────────── */
        .search-section {
            margin-bottom: 28px;
            animation: slide-up 0.618s cubic-bezier(0.618, 0, 0.382, 1) 0.162s both;
        }

        .search-bar-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 16px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 14px;
            background: rgba(26, 26, 62, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #FAFAFA;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .search-input:focus {
            border-color: rgba(0, 217, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.08), 0 0 20px rgba(0, 217, 255, 0.12);
        }

        .category-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(26, 26, 62, 0.5);
            color: rgba(255, 255, 255, 0.55);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
            white-space: nowrap;
        }

        .pill:hover {
            border-color: rgba(212, 175, 55, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }

        .pill.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.45);
            color: #D4AF37;
            box-shadow: 0 0 14px rgba(212, 175, 55, 0.25);
        }

        /* ── SECTION HEADING ─────────────────────────────────── */
        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #FAFAFA;
            letter-spacing: -0.3px;
        }

        .section-count {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ── SKILL GRID ──────────────────────────────────────── */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            animation: slide-up 0.618s cubic-bezier(0.618, 0, 0.382, 1) 0.262s both;
        }

        @media (max-width: 1024px) {
            .skill-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .skill-grid { grid-template-columns: 1fr; }
            .main { padding: 0 16px 60px; }
            .nav { padding: 0 16px; }
            .featured-content { padding: 24px; }
            .featured-title { font-size: 24px; }
            .featured-geo { display: none; }
        }

        .skill-card {
            background: rgba(26, 26, 62, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            opacity: 0;
            transition: opacity 0.382s cubic-bezier(0.618, 0, 0.382, 1);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.04) 0%, rgba(0, 217, 255, 0.04) 100%);
        }

        .skill-card:hover {
            transform: translateY(-3px);
            border-color: rgba(212, 175, 55, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .skill-card:hover::before {
            opacity: 1;
        }

        .skill-card.installed {
            border-color: rgba(0, 217, 255, 0.3);
            animation: glow-pulse-cyan 3s ease-in-out infinite;
        }

        .skill-card-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        /* Sacred geometry icon */
        .skill-icon {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            position: relative;
        }

        .skill-icon svg {
            width: 100%;
            height: 100%;
        }

        .skill-info {
            flex: 1;
            min-width: 0;
        }

        .skill-name {
            font-size: 15px;
            font-weight: 700;
            color: #FAFAFA;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .swarm-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.2px;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .skill-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .skill-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .skill-stats {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .stars-row {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .stars {
            color: #D4AF37;
            letter-spacing: 1px;
        }

        .rating-val {
            color: #D4AF37;
            font-weight: 600;
        }

        .user-count {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-card {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .btn-card.get {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #D4AF37;
        }

        .btn-card.get:hover {
            background: rgba(212, 175, 55, 0.28);
            box-shadow: 0 0 14px rgba(212, 175, 55, 0.3);
        }

        .btn-card.uninstall {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            color: #00D9FF;
        }

        .btn-card.uninstall:hover {
            background: rgba(255, 0, 160, 0.12);
            border-color: rgba(255, 0, 160, 0.3);
            color: #FF00A0;
        }

        /* ── MY SKILLS VIEW ──────────────────────────────────── */
        .my-skills-empty {
            text-align: center;
            padding: 80px 40px;
            color: rgba(255, 255, 255, 0.3);
        }

        .my-skills-empty .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .my-skills-empty h3 {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .usage-bar-wrap {
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .usage-bar {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #00D9FF, #D4AF37);
            transition: width 0.618s cubic-bezier(0.618, 0, 0.382, 1);
        }

        /* ── MODAL ───────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.382s cubic-bezier(0.618, 0, 0.382, 1);
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: rgba(26, 26, 62, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 36px;
            position: relative;
            animation: modal-in 0.382s cubic-bezier(0.618, 0, 0.382, 1) both;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 0 0 60px rgba(212, 175, 55, 0.06);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.382s cubic-bezier(0.618, 0, 0.382, 1);
        }

        .modal-close:hover {
            background: rgba(255, 0, 160, 0.15);
            border-color: rgba(255, 0, 160, 0.3);
            color: #FF00A0;
        }

        .modal-header {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }

        .modal-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px var(--cat-color, rgba(212, 175, 55, 0.5)));
        }

        .modal-title {
            font-size: 26px;
            font-weight: 800;
            color: #FAFAFA;
            margin-bottom: 6px;
        }

        .modal-swarm-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-stars {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .modal-desc {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .modal-section-label {
            font-size: 11px;
            font-weight: 700;

    function starString(rating) {
        const full = Math.floor(rating);
        const half = rating - full >= 0.5;
        let s = '';
        for (let i = 0; i < full; i++) s += '★';
        if (half) s += '½';
        while (s.replace(/½/g, '').length + (half ? 1 : 0) < 5) s += '☆';
        // Normalize to 5 chars of stars
        return s;
    }

    function formatUsers(u) {
        return u + ' users';
    }

    function buildSacredIcon(color, size = 52) {
        const c = color;
        const alpha = (hex, a) => {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a})`;
        };
        const fill = alpha(c, 0.12);
        const stroke = c;
        const r = size / 2;
        const cx = r, cy = r;
        return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
            <circle cx="${cx}" cy="${cy}" r="${r - 1}" fill="${fill}" stroke="${stroke}" stroke-width="1.2" opacity="0.9"/>
            <circle cx="${cx}" cy="${cy}" r="${r * 0.62}" fill="none" stroke="${stroke}" stroke-width="0.8" opacity="0.6"/>

        </svg>`;
    }

                grid.appendChild(empty);
            } else {
                mySkills.forEach(s => grid.appendChild(buildMySkillCard(s)));
            }
            document.getElementById('section-title').textContent = 'My Skills';
            document.getElementById('section-count').textContent = `${mySkills.length} installed`;
            return;
        }

        const skills = filteredSkills();
        document.getElementById('section-count').textContent = `${skills.length} skill${skills.length !== 1 ? 's' : ''}`;

        if (skills.length === 0) {
            const noRes = document.createElement('div');
            noRes.className = 'no-results';
            noRes.innerHTML = `<h3>No skills found</h3><p>Try a different search or category.</p>`;
            grid.appendChild(noRes);
        } else {
            skills.forEach(s => grid.appendChild(buildSkillCard(s)));
        }

        // Update section title
        document.getElementById('section-title').textContent =
            activeCategory === 'All' && !searchQuery ? 'All Skills' :
            searchQuery ? `Results for "${searchQuery}"` :
            activeCategory + ' Skills';
    }

    function renderCategoryPills() {
        const container = document.getElementById('category-pills');
        container.innerHTML = '';
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'pill' + (cat === activeCategory ? ' active' : '');
            btn.textContent = cat;
            btn.onclick = () => {
                activeCategory = cat;
                renderCategoryPills();
                renderGrid();
            };
            container.appendChild(btn);
        });
    }

    function updateNavBadge() {
        document.getElementById('installed-count-nav').textContent = installedIds.size;
    }

    // ── INSTALL / UNINSTALL ───────────────────────────────────────────────────

    function toggleInstallById(id) {
        const skill = SKILLS.find(s => s.id === id);
        if (!skill) return;

        const wasInstalled = installedIds.has(id);
        const action = wasInstalled ? 'uninstall' : 'install';

        // Optimistic UI update
        if (wasInstalled) {
            installedIds.delete(id);
        } else {
            installedIds.add(id);
        }

        updateNavBadge();
        renderGrid();
        showToast(wasInstalled ? `${skill.name} uninstalled` : `${skill.name} installed`, wasInstalled ? 'uninstall-toast' : 'install-toast');

        // Update featured banner button if relevant
        if (id === 11) updateFeaturedBtn();

        // Update modal if open
        if (openSkillId === id) {
            openModal(id);
        }

        // API call (fire and forget)
        const endpoint = wasInstalled ? '/api/features/marketplace/uninstall' : '/api/features/marketplace/install';
        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ skillId: id, skillName: skill.name, swarm: skill.swarm })
        }).catch(() => {}); // Silent fail — optimistic update already applied
    }

    function updateFeaturedBtn() {
        const btn = document.getElementById('featured-install-btn');
        if (!btn) return;
        const installed = installedIds.has(11);
        btn.textContent = installed ? 'Uninstall' : 'Install Skill';
        btn.className = 'btn-install primary' + (installed ? ' installed' : '');
    }

    // ── MODAL ─────────────────────────────────────────────────────────────────

    function openModal(id) {
        const skill = SKILLS.find(s => s.id === id);
        if (!skill) return;
        openSkillId = id;
        const installed = installedIds.has(id);

        // Rating breakdown
        const totalReviews = Object.values(skill.reviews).reduce((a, b) => a + b, 0);
        const breakdownHtml = [5, 4, 3, 2, 1].map(star => {
            const pct = Math.round((skill.reviews[star] / totalReviews) * 100);
            return `<div class="rating-row">
                <span class="rating-label">${star}★</span>
                <div class="rating-bar-wrap"><div class="rating-bar-fill" style="width:${pct}%"></div></div>
                <span class="rating-count">${skill.reviews[star]}%</span>
            </div>`;
        }).join('');

        // Related skills
        const relatedHtml = skill.related.map(rid => {
            const rs = SKILLS.find(s => s.id === rid);
            if (!rs) return '';
            return `<div class="related-pill" onclick="openModal(${rs.id})">
                <div style="width:18px;height:18px;">${buildSacredIcon(rs.color, 18)}</div>
                ${rs.name}
            </div>`;
        }).join('');

        document.getElementById('modal-content').innerHTML = `
            <div class="modal-header">
                <div class="modal-icon" style="--cat-color:${skill.color}40">${buildSacredIcon(skill.color, 80)}</div>
                <div style="flex:1;min-width:0;">
                    <div class="modal-title">${skill.name}</div>
                    <div class="modal-swarm-badge">
                        <span class="swarm-badge swarm-${skill.swarm}">${skill.swarm}</span>
                        <span style="font-size:12px;color:rgba(255,255,255,0.4);font-weight:400;">${skill.category}</span>
                    </div>
                    <div class="modal-stars">
                        <span style="color:#D4AF37;font-size:15px;">★★★★${skill.rating >= 4.8 ? '★' : '½'}</span>
                        <span style="color:#D4AF37;font-weight:700;">${skill.rating.toFixed(1)}</span>
                        <span style="color:rgba(255,255,255,0.3);font-size:13px;">&bull; ${formatUsers(skill.users)}</span>
                    </div>
                </div>
            </div>

            <div class="modal-desc">${skill.fullDesc}</div>

            <div class="modal-section-label">Skill Preview</div>
            <div class="modal-preview">
                <span>Live preview available after installation</span>
            </div>

            <div class="modal-section-label">Rating Breakdown</div>
            <div class="rating-breakdown">${breakdownHtml}</div>

            <div class="modal-section-label">Related Skills</div>
            <div class="related-grid">${relatedHtml}</div>

            <div class="modal-footer">
                <button class="btn-modal install${installed ? ' installed' : ''}" onclick="toggleInstallById(${id})">
                    ${installed ? 'Installed — Open Skill' : 'Install Skill'}
                </button>
                ${installed ? `<button class="btn-modal uninstall-modal" onclick="toggleInstallById(${id})">Remove</button>` : ''}
            </div>
        `;

        const overlay = document.getElementById('modal-overlay');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const overlay = document.getElementById('modal-overlay');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        openSkillId = null;
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    // ── VIEW TOGGLE ───────────────────────────────────────────────────────────

    function setView(view) {
        currentView = view;
        document.getElementById('btn-browse').classList.toggle('active', view === 'browse');
        document.getElementById('btn-myskills').classList.toggle('active', view === 'myskills');

        const isBrowse = view === 'browse';
        document.getElementById('featured-banner').style.display = isBrowse ? '' : 'none';
        document.getElementById('search-section').style.display = isBrowse ? '' : 'none';

        renderGrid();
    }

    // ── SEARCH ────────────────────────────────────────────────────────────────

    function onSearch() {
        searchQuery = document.getElementById('search-input').value;
        renderGrid();
    }

    // ── TOAST ─────────────────────────────────────────────────────────────────

    let toastTimer = null;
    function showToast(msg, cls = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + cls + ' show';
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2400);
    }

    // ── KEYBOARD ──────────────────────────────────────────────────────────────

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    // ── INIT ──────────────────────────────────────────────────────────────────

    renderCategoryPills();
    renderGrid();
    updateNavBadge();
    updateFeaturedBtn();
    </script>
</body>
</html>
